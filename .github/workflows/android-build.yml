name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          npm ci --legacy-peer-deps
          npm list --depth=0

      - name: Lint and Type Check
        run: |
          echo "Running lint..."
          npm run lint

      - name: Build web app
        run: |
          echo "Building web app..."
          npm run build
          echo "Checking dist directory..."
          ls -la dist

      - name: Capacitor Sync
        run: |
          echo "Syncing Capacitor..."
          npx cap sync android
          echo "Checking synced assets..."
          ls -R android/app/src/main/assets/public
          test -f android/app/src/main/assets/public/index.html || (echo "index.html not found in assets" && exit 1)

      - name: Check Android structure
        run: |
          ls -la android
          ls -la android/app

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --info --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
